<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employment Separation Form</title>
    <link rel="stylesheet" href="./css/baitap3.css">
</head>
<body>

    <div class="form-container">
        <div class="form-header">
            Employment Separation Form
        </div>

        <form class="form-body">
            
            <div class="form-group">
                <label class="form-label">Full Name</label>
                <div class="grid-2-col">
                    <div>
                        <div class="input-with-icon">
                            <i class="fa-regular fa-user input-icon"></i>
                            <input type="text">
                        </div>
                        <p class="sub-text">First Name</p>
                    </div>
                    <div>
                        <input type="text" class="pure-input">
                        <p class="sub-text">Last Name</p>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Employee ID</label>
                <div class="input-with-icon">
                    <i class="fa-regular fa-id-card input-icon"></i>
                    <input type="text">
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Personal Email</label>
                <div class="input-with-icon">
                    <i class="fa-regular fa-envelope input-icon"></i>
                    <input type="email">
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Last Working Date</label>
                <div class="input-with-icon max-width-sm">
                    <i class="fa-regular fa-calendar input-icon"></i>
                    <input type="text" placeholder="dd-MMM-yyyy">
                </div>
                <p class="sub-text">dd-MMM-yyyy</p>
            </div>

            <div class="form-group">
                <label class="form-label">Reason for Departure</label>
                <div class="input-with-icon">
                    <i class="fa-regular fa-comment-dots input-icon"></i>
                    <input type="text">
                </div>
            </div>

            <div class="form-group">
                <label class="form-label margin-bottom-sm">Return of All Company Property</label>
                <div class="radio-group">
                    <label class="radio-box">
                        <input type="radio" name="property_return" value="yes">
                        Yes
                    </label>
                    <label class="radio-box">
                        <input type="radio" name="property_return" value="no">
                        No
                    </label>
                    <label class="radio-box">
                        <input type="radio" name="property_return" value="other">
                        Other
                    </label>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Exit Interview Schedule</label>
                <div class="input-with-icon max-width-sm">
                    <i class="fa-regular fa-calendar-days input-icon"></i>
                    <input type="text">
                </div>
                <p class="sub-text">dd-MMM-yyyy HH:mm AM/PM</p>
            </div>

            <div class="form-group">
                <label class="form-label">Comments/ Feedback</label>
                <textarea rows="3"></textarea>
            </div>

            <div class="form-footer">
                <button type="submit" class="btn-submit">Submit</button>
            </div>
        </form>
    </div>
</body>
</html>
