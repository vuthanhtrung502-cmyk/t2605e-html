<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layout Demo</title>
    <link rel="stylesheet" href="css/layout.css"/>
</head>
<body>
    <header class="section header">
        <div class="container">
            <h1>Content Header Here!</h1>
        </div>
    </header>
    <nav class="section menu">
        <div class="container">
            <h1>Content Menu Here!</h1>
        </div>
    </nav>
    <section class="section banner-slider">
        <div class="container">
            <form method="get" action="#">
                <div class="form-group">
                    <label>Enter full name</label>
                    <input name="fullname" type="text" placeholder="Full name" />
                </div>
                <div class="form-group">
                    <label>Enter email</label>
                    <input name="my_email" type="email" placeholder="Please enter your email" />
                </div>
                <div class="form-group">
                    <label>Enter password</label>
                    <input name="pwd" type="password" placeholder="Please enter your password" />
                </div>
                <div class="form-group">
                    <label>Enter DOB</label>
                    <input name="dob" type="date" placeholder="Your Dob" />
                </div>
                <div class="form-group">
                    <label>Gender</label>
                    <label><input name="Gender" type="radio" value="male" /> Male</label>
                    <label><input name="Gender" type="radio" value="female" /> Female</label>
                </div>
                <div class="form-group">
                    <label>
                    <input name="send_email" type="checkbox" value="yes" />| Send email after register</label>
                </div>
                <div class="form-group">
                    <label>City</label>
                    <select name="your_city">
                        <option value="Hn"> Hanoi</option>
                        <option value="TP HCM"> Hcm</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Content</label>
                    <textarea name="profile" rows="4"></textarea>
                </div>
                <div class="form-group">
                    <button type="submit" value="save">Save</button>
                    <button type="submit" value="save_draft">Save Draft</button>
                    <button type="button">Button X</button>
                    <button type="reset">Reset form</button>
                </div>
            </form>
        </div>
    </section>
    <main class="section main">
        <div class="container">
            <div class="item">
                <img src="imgs/tải xuống.jpg"/>
                <h3>Apple Macbook Pro 16 2024</h3>
                <p>Enormous</p>
                <p>4219$</p>
            </div>
            <div class="item">
                <img src="imgs/tải xuống.jpg"/>
                <h3>Apple Macbook Pro 16 2024</h3>
                <p>Enormous</p>
                <p>4219$</p>
            </div>
            <div class="item">
                <img src="imgs/tải xuống.jpg"/>
                <h3>Apple Macbook Pro 16 2024</h3>
                <p>Enormous</p>
                <p>4219$</p>
            </div>
            <div class="item">
                <img src="imgs/tải xuống.jpg"/>
                <h3>Apple Macbook Pro 16 2024</h3>
                <p>Enormous</p>
                <p>4219$</p>
            </div>
        </div>
    </main>
    <footer class="section footer">
        <div class="container">
            <h1>Content Footer Here!</h1>
        </div>
    </footer>
</body>
</html>
